name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-php-drift:
    name: PHP extensions drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare Dockerfile base stage vs CI extensions
        run: bash .github/scripts/check-php-extensions-drift.sh

  docker-dev-validate:
    name: Docker dev image (smoke build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          target: dev
          push: false
          load: true
          tags: reservatiion-php:dev-ci
          cache-from: type=gha,scope=php-dev
          cache-to: type=gha,mode=max,scope=php-dev
      - name: Smoke run
        run: docker run --rm reservatiion-php:dev-ci php --version

  docker-prod-validate:
    name: Docker prod image (smoke build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build prod stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          target: prod
          push: false
          load: true
          tags: reservatiion-php:prod-ci
          cache-from: type=gha,scope=php-prod
          cache-to: type=gha,mode=max,scope=php-prod
      - name: Smoke run
        run: docker run --rm reservatiion-php:prod-ci php --version

  backend-lint:
    name: Backend lint (Pint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: ./vendor/bin/pint --test

  backend-static:
    name: Backend static analysis (PHPStan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, redis, bcmath, intl, gd, zip, opcache, pcntl
          tools: composer:v2
          coverage: none
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

  backend-test:
    name: Backend tests (Pest)
    needs: check-php-drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: reservatiion_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d reservatiion_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: reservatiion_test
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, redis, bcmath, intl, gd, zip, opcache, pcntl
          tools: composer:v2
          coverage: none
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Migrate test database
        run: php artisan migrate --no-interaction --force
      - name: Run tests
        run: php artisan test --parallel

  frontend-lint:
    name: Frontend lint (ESLint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  frontend-test:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit -- --run

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
