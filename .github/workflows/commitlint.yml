name: Commitlint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Commitlint (conventional commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
