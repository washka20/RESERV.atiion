services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/var/www/html/public:ro
      - frontend_dist:/var/www/frontend/dist:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: warning
    volumes:
      - backend_public:/var/www/html/public
      - backend_storage:/var/www/html/storage
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M

  postgres:
    restart: always
    # Никаких exposed ports в prod
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M

  redis:
    restart: always
    ports: []
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  minio:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  minio-init:
    restart: "no"

volumes:
  backend_public:
  backend_storage:
  frontend_dist:
