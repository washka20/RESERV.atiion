services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL termination placeholder — в реальном deploy смонтировать certs
      # - ./ssl/staging:/etc/nginx/ssl:ro
    environment:
      APP_ENV: staging

  php:
    build:
      target: prod
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
    restart: always

  # postgres/redis/minio — из base, без exposed ports (доступ только внутри сети)

  minio-init:
    restart: "no"
