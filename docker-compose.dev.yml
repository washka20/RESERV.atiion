services:
  nginx:
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html
    depends_on:
      php:
        condition: service_healthy
      frontend:
        condition: service_started

  php:
    build:
      target: dev
      args:
        APP_UID: "${APP_UID:-1000}"
        APP_GID: "${APP_GID:-1000}"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    volumes:
      - ./backend:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Entrypoint делает composer install / filament:assets при первом старте —
    # даём healthcheck'у грейс (prod-образ сразу готов, там префабрик).
    healthcheck:
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5273}:5173"
    networks:
      - reservatiion
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null 2>&1 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    ports:
      - "${MINIO_API_PORT:-9500}:9000"
      - "${MINIO_CONSOLE_PORT:-9501}:9001"

volumes:
  frontend_node_modules:
