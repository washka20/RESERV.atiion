upstream php_upstream {
    server php:9000;
    keepalive 16;
}

# Rate-limit zones — IP-based, чтобы один клиент не забивал endpoint.
# $binary_remote_addr ~16 bytes per IP, 10m = ~625k unique IPs.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=admin_general:10m rate=10r/s;

# Optional HTTP → HTTPS redirect (раскомментировать после получения certs).
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    # HTTPS/HTTP2 server — production listens on 443 + fallback на 80.
    # Для первого deploy SSL certs подключаются через bind-mount /etc/letsencrypt.
    listen 80 default_server;
    listen [::]:80 default_server;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_tickets off;

    server_name _;

    client_max_body_size 32m;

    # Security headers (ADR-018). CSP — placeholder, точный список sources
    # настраивается после выбора CDN домена.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP — явный, начинаем с restrictive. Frontend после выбора CDN: script-src.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hide nginx version
    server_tokens off;

    # Gzip для текстовых типов — уменьшает bandwidth в 3-5x.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/font-ttf
        application/manifest+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-javascript
        font/opentype
        font/ttf
        image/svg+xml
        image/x-icon
        text/css
        text/javascript
        text/plain
        text/xml;

    # Backend API — общий rate limit + auth endpoint'ы под жёстким лимитом.
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Filament admin — под rate limit + запрет индексации.
    location /admin {
        limit_req zone=admin_general burst=10 nodelay;

        add_header X-Robots-Tag "noindex, nofollow" always;

        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /livewire {
        limit_req zone=admin_general burst=10 nodelay;

        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health endpoint — без rate limit (load balancer ping'ует часто).
    location = /api/v1/health {
        access_log off;
        root /var/www/html/public;
        try_files /index.php?$query_string =404;
    }

    # Laravel storage
    location /storage/ {
        root /var/www/html/public;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # PHP — Laravel entrypoint
    location ~ \.php$ {
        root /var/www/html/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;

        # Client IP для корректного throttle в Laravel.
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
    }

    # Vue SPA (static build) — cached static, SPA fallback на index.html.
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
            root /var/www/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Deny access to sensitive files.
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
