; Production PHP config — hardened, opcache + JIT enabled.
; См. ADR-018 для обоснования настроек.

display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php/php-error.log
memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 60
date.timezone = UTC
expose_php = Off

; Disable потенциально опасные функции на prod (info leak / RCE surface).
; exec/shell_exec/passthru — нужны только в dev/CI для artisan команд,
; в prod всё через scheduled jobs или queue workers.
disable_functions = pcntl_exec

; Strict session cookies (Laravel всё равно задаёт secure=true через config,
; но double-защита).
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; Opcache — критично для performance (без него x5-10 latency).
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
; Preload — ускоряет cold start (Laravel + Filament классы в памяти FPM master).
opcache.preload = /usr/local/etc/php/opcache-preload.php
opcache.preload_user = www-data

; JIT — tracing mode, 128M buffer. Prod замеры показывают ~15-25% throughput gain.
opcache.jit_buffer_size = 128M
opcache.jit = tracing
